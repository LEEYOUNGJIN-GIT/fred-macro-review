name: Sync Macro to Claude Project

on:
  workflow_run:
    workflows: ["FRED Daily Fetch", "Market Daily Fetch", "Global Daily Fetch"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sync macro .md files to Claude Project
        env:
          CLAUDE_SESSION_KEY: ${{ secrets.CLAUDE_SESSION_KEY }}
          CLAUDE_ORG_ID: ${{ secrets.CLAUDE_ORG_ID }}
          CLAUDE_PROJECT_ID: ${{ secrets.CLAUDE_PROJECT_ID }}
        run: |
          python3 << 'PYEOF'
          import os, sys, requests

          base = "https://claude.ai/api"
          org  = os.environ["CLAUDE_ORG_ID"]
          proj = os.environ["CLAUDE_PROJECT_ID"]
          key  = os.environ["CLAUDE_SESSION_KEY"]

          headers = {
              "cookie": f"sessionKey={key}",
              "content-type": "application/json",
              "user-agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "origin": "https://claude.ai",
              "referer": f"https://claude.ai/project/{proj}",
          }

          FILES = [
              ("fred_latest.md",    "data/fred_latest.md"),
              ("fred_regime.md",    "data/fred_regime.md"),
              ("fred_signals.md",   "data/fred_signals.md"),
              ("market_latest.md",  "data/market_latest.md"),
              ("market_signals.md", "data/market_signals.md"),
              ("global_latest.md",  "data/global_latest.md"),
              ("global_signals.md", "data/global_signals.md"),
          ]
          target_names = {f[0] for f in FILES}

          r = requests.get(
              f"{base}/organizations/{org}/projects/{proj}/docs",
              headers=headers
          )
          if not r.ok:
              print(f"[ERROR] 문서 목록 조회 실패: {r.status_code}")
              print(r.text[:300])
              sys.exit(1)

          existing = r.json()
          print(f"현재 프로젝트 문서 수: {len(existing)}")

          for doc in existing:
              name = doc.get("file_name", "")
              if name in target_names:
                  uid = doc.get("uuid") or doc.get("id", "")
                  d = requests.delete(
                      f"{base}/organizations/{org}/projects/{proj}/docs/{uid}",
                      headers=headers
                  )
                  print(f"[DEL] {name}: HTTP {d.status_code}")

          for fname, fpath in FILES:
              if not os.path.isfile(fpath):
                  print(f"[SKIP] {fname}: {fpath} not found")
                  continue
              with open(fpath, encoding="utf-8") as f:
                  content = f.read()
              r = requests.post(
                  f"{base}/organizations/{org}/projects/{proj}/docs",
                  headers=headers,
                  json={"file_name": fname, "content": content}
              )
              if r.ok:
                  print(f"[OK]  Uploaded {fname} ({len(content):,} chars)")
              else:
                  print(f"[ERROR] {fname} 업로드 실패: {r.status_code}")
                  print(r.text[:300])
                  sys.exit(1)

          print("Macro sync complete!")
          PYEOF
