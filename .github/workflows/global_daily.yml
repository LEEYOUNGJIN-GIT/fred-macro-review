# ═══════════════════════════════════════════════════════════
# Global Macro Layer — WB / OECD / IMF / ECB (no API keys)
# ═══════════════════════════════════════════════════════════
# Schedule: KST 매일 06:20 (UTC 21:20) — FRED/Market 이후
# Flow: global_fetch.py → Global_signals.py → git push

name: Global Daily Fetch

on:
  schedule:
    - cron: "20 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch global macro data
        run: python global_fetch.py

      - name: Run global signals
        run: python scripts/Global_signals.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/global_latest.csv data/global_latest.md
          git add data/global_signals.md
          git add data/global_history/*.csv || true

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
          git commit -m "Global daily update — ${TIMESTAMP}"
          git push
