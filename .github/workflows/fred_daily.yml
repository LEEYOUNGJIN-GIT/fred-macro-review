name: FRED Daily Fetch for Claude

# ─── 트리거 설정 ───
on:
  schedule:
    # KST 08:30 = UTC 23:30 (매일)
    - cron: "30 23 * * *"
  workflow_dispatch:
    # Actions 탭에서 수동 실행 가능
    inputs:
      reason:
        description: "수동 실행 사유 (선택)"
        required: false
        default: "수동 테스트"

# ─── 권한 ───
permissions:
  contents: write

# ─── 작업 ───
jobs:
  fetch-fred:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1) 레포 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Python 설치
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3) 의존성 설치
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4) FRED API 조회 및 팩트 테이블 생성
      - name: Run FRED fetch script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fred_fetch.py

      # 5) 결과 파일을 repo에 커밋 & 푸시
      - name: Commit and push data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fred_latest.csv data/fred_latest.md
          git add data/fred_history/*.csv || true
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "📊 Update FRED macro data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push
