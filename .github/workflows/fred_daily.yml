# ═══════════════════════════════════════════════════════════
# FRED Macro Review — Daily Fetch & Analysis Pipeline
# ═══════════════════════════════════════════════════════════
# Schedule: 매일 KST 08:30 (UTC 23:30)
# Flow: fred_fetch.py → Fred_signals.py → Fred_regime.py → git push

name: FRED Daily Fetch

on:
  schedule:
    - cron: "30 23 * * *"          # UTC 23:30 = KST 08:30
  workflow_dispatch:                 # 수동 실행 지원

permissions:
  contents: write                   # git push 권한

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python Setup ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Dependencies ──
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. FRED API Fetch (fred_fetch.py) ──
      - name: Fetch FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fred_fetch.py

      # ── 5. Signals & Regime Analysis ──
      - name: Run analysis scripts
        run: |
          python scripts/Fred_signals.py
          python scripts/Fred_regime.py

      # ── 6. Commit & Push ──
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/fred_latest.csv data/fred_latest.md
          git add data/fred_signals.md data/fred_regime.md
          git add data/fred_history/*.csv || true

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
          git commit -m "📊 FRED daily update — ${TIMESTAMP}"
          git push
