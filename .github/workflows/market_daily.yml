# ═══════════════════════════════════════════════════════════
# Market Layer v1 — Yahoo Finance Supplementary Fetch
# ═══════════════════════════════════════════════════════════
# Schedule: KST 화~토 06:00 (UTC 21:00 Mon-Fri)
# Flow: market_fetch.py → Market_signals.py → git push
# Note: FRED pipeline (fred_daily.yml)과 독립

name: Market Daily Fetch

on:
  schedule:
    - cron: "0 21 * * 1-5"          # UTC 21:00 Mon-Fri = KST 06:00 Tue-Sat
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch market data
        run: python market_fetch.py

      - name: Run market signals
        run: python scripts/Market_signals.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/market_latest.csv data/market_latest.md
          git add data/market_signals.md
          git add data/market_history/market_*.csv || true

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
          git commit -m "Market daily update — ${TIMESTAMP}"
          git pull --rebase origin main
          git push
